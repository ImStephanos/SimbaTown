<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;

      background: linear-gradient(-45deg,
        #ffb3c6, #ffd6a5, #fdffb6,
        #caffbf, #9bf6ff, #a0c4ff,
        #bdb2ff, #ffc6ff
      );

      background-size: 500% 500%;
      animation: gradientMove 6s ease infinite;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 15px;
      font-weight: bold;
      color: #111;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff2e63;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    #caption {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
      color: #111;
    }
  </style>
</head>

<body>

<h1>🐶 Simba Town</h1>

<p>Feeling down… welcome to Simba Town.</p>

<!-- Music button -->
<button onclick="toggleMusic()" id="musicBtn">Play Music 🎵</button>

<!-- Main button -->
<button onclick="showDogs()">Click for comfort</button>

<!-- 3 images -->
<div class="grid">
  <img id="dog1">
  <img id="dog2">
  <img id="dog3">
</div>

<div id="caption"></div>

<!-- Music -->
<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Simba says: Smile!",
  "Simba says: Lock in!",
  "Simba says: He loves you!",
  "He might not be The Lion King, but he is Simba.",
  "Mackenzie, you are enough!",
  "A photo of Simba a day keeps the stress away.",
  "Welcome to The Simba Safehouse.",
  "Simba Nation RISE UP!",
  "PAUSE — go and cuddle Simba immediately!",
  "Did you know today is National Hug Simba Day?",
  "Simbaaaaa 🐶",
  "A sad Mackenzie equals a sad Simba — lock tf in.",
  "You are loved.",
  "If you’re reading this you need to hug Simba!",
  "Fun fact: hugging Simba reduces stress.",
  "Simba… Simba… Simbaa…",
  "Simba believes in you.",
  "Emergency comfort activated.",
  "You are doing better than you think.",
  "Simba is proud of you.",
  "Take a breath. You’re safe here.",
  "Everything will be okay.",
  "Soft moment detected.",
  "Welcome home 🐶",
  "Simba is watching over you.",
  "You matter more than you think.",
  "Pause. Breathe. Simba time.",
  "Comfort mode engaged.",
  "This dog believes in you.",
  "Safe zone active."
];

let lastIndex = -1;

function showDogs() {
  const caption = document.getElementById("caption");

  let picks = [];
  while (picks.length < 3) {
    let i = Math.floor(Math.random() * images.length);
    if (!picks.includes(i) && i !== lastIndex) picks.push(i);
  }

  lastIndex = picks[0];

  const ids = ["dog1", "dog2", "dog3"];

  for (let i = 0; i < 3; i++) {
    const img = document.getElementById(ids[i]);
    img.src = images[picks[i]];
    img.style.display = "block";
  }

  const capIndex = Math.floor(Math.random() * captions.length);
  caption.innerText = captions[capIndex];
}

function toggleMusic() {
  const music = document.getElementById("bgmusic");
  const btn = document.getElementById("musicBtn");

  if (music.paused) {
    music.play();
    btn.innerText = "Pause Music ⏸️";
  } else {
    music.pause();
    btn.innerText = "Play Music 🎵";
  }
}
</script>

</body>
</html>
