<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;

      background: linear-gradient(-45deg, #ffb3c6, #ffd6a5, #fdffb6, #caffbf);
      background-size: 500% 500%;
      animation: gradientMove 6s ease infinite;

      display: flex;
      height: 100vh;
      transition: background 0.6s ease;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* SIDES */
    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      z-index: 2;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* CENTER */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
    }

    h1 { margin-bottom: 10px; }

    p {
      font-weight: bold;
      color: #111;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff2e63;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    #caption {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
    }

    /* MOOD BOX */
    .moodBox {
      margin-top: 20px;
      background: rgba(255,255,255,0.4);
      padding: 12px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }

    input[type="range"] {
      width: 220px;
    }

    /* PARTICLES (MORE INTENSE) */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatUp linear infinite;
      z-index: 1;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.8); }
      to { transform: translateY(-10vh) scale(1.4); }
    }
  </style>
</head>

<body>

<div class="side" id="leftSide"></div>

<div class="center">

  <h1>🐶 Simba Town</h1>
  <p>Feeling down… welcome to Simba Town.</p>

  <button onclick="toggleMusic()" id="musicBtn">Play Music 🎵</button>
  <button onclick="showDogs()">Click for comfort</button>

  <div class="grid">
    <img id="dog1">
    <img id="dog2">
    <img id="dog3">
  </div>

  <div id="caption"></div>

  <div class="moodBox">
    <p>How much has Simba improved your mood?</p>
    <input type="range" min="0" max="100" value="50" id="moodSlider" oninput="updateMood(this.value)">
    <div id="moodValue">50%</div>
  </div>

</div>

<div class="side" id="rightSide"></div>

<audio id="bgmusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

function showDogs() {
  const ids = ["dog1", "dog2", "dog3"];
  const caption = document.getElementById("caption");

  let picks = [];
  while (picks.length < 3) {
    let i = Math.floor(Math.random() * images.length);
    if (!picks.includes(i)) picks.push(i);
  }

  for (let i = 0; i < 3; i++) {
    const img = document.getElementById(ids[i]);
    img.src = images[picks[i]];
    img.style.display = "block";
  }
}

/* 🎵 MUSIC */
function toggleMusic() {
  const music = document.getElementById("bgmusic");
  const btn = document.getElementById("musicBtn");

  if (music.paused) {
    music.volume = 0.5;

    music.play().then(() => {
      btn.innerText = "Pause Music ⏸️";
    }).catch(() => {
      alert("Tap again to start music");
    });

  } else {
    music.pause();
    btn.innerText = "Play Music 🎵";
  }
}

/* 📊 MOOD → BACKGROUND COLOR */
function updateMood(val) {
  document.getElementById("moodValue").innerText = val + "%";

  let color;

  if (val < 20) {
    color = "#2b2d42"; // very low mood (dark)
  } else if (val < 40) {
    color = "#6c757d"; // low
  } else if (val < 60) {
    color = "#ffd6a5"; // neutral warm
  } else if (val < 80) {
    color = "#caffbf"; // good
  } else {
    color = "#9bf6ff"; // very happy
  }

  document.body.style.background = color;
}

/* 🐾 SIDES */
function loadSides() {
  const left = document.getElementById("leftSide");
  const right = document.getElementById("rightSide");

  for (let i = 0; i < 6; i++) {
    let imgL = document.createElement("img");
    let imgR = document.createElement("img");

    imgL.src = images[Math.floor(Math.random() * images.length)];
    imgR.src = images[Math.floor(Math.random() * images.length)];

    left.appendChild(imgL);
    right.appendChild(imgR);
  }
}

/* ✨ INTENSE PARTICLES */
function createParticles() {
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const size = 4 + Math.random() * 6;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    p.style.opacity = 0.4 + Math.random() * 0.6;

    document.body.appendChild(p);
  }
}

/* INIT */
loadSides();
createParticles();
</script>

</body>
</html>
