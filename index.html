<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;

      /* 🌈 faster, brighter pastel animation */
      background: linear-gradient(-45deg,
        #ffb3c6,
        #ffd6a5,
        #fdffb6,
        #caffbf,
        #9bf6ff,
        #a0c4ff,
        #bdb2ff,
        #ffc6ff
      );

      background-size: 500% 500%;
      animation: gradientMove 6s ease infinite;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      color: #222;
      font-weight: bold;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff2e63;
    }

    img {
      margin-top: 25px;
      max-width: 320px;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 15px;
      font-size: 18px;
      color: #111;
      display: none;
      max-width: 420px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🐶 Simba Town</h1>

<p>Feeling down… welcome to Simba Town.</p>

<button onclick="showDog()">Click for comfort</button>

<img id="dog" src="">
<div id="caption"></div>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Simba says: Smile!",
  "Simba says: Lock in!",
  "Simba says: He loves you!",
  "He might not be The Lion King, but he is Simba.",
  "Mackenzie, you are enough!",
  "A photo of Simba a day keeps the stress away.",
  "Welcome to The Simba Safehouse.",
  "Simba Nation RISE UP!",
  "PAUSE — go and cuddle Simba immediately!",
  "Did you know today is National Hug Simba Day?",
  "Simbaaaaa 🐶",
  "A sad Mackenzie equals a sad Simba — lock tf in.",
  "You are loved.",
  "If you’re reading this you need to hug Simba!",
  "Fun fact: hugging Simba for 7 minutes reduces stress dramatically.",
  "Simba… Simba… Simbaa…",
  "Simba believes in you.",
  "Emergency Simba comfort activated.",
  "You are doing better than you think.",
  "Simba is proud of you.",
  "Take a breath. You’re safe here.",
  "This is your comfort checkpoint.",
  "Simba has entered the chat.",
  "Everything is okay right now.",
  "You are not alone.",
  "SIMBA TIME.",
  "Simba is watching over you.",
  "You matter more than you think.",
  "Pause. Breathe. Simba time.",
  "Welcome home 🐶"
];

let lastIndex = -1;

function showDog() {
  const img = document.getElementById("dog");
  const cap = document.getElementById("caption");

  // prevent same image twice in a row
  let newIndex;
  do {
    newIndex = Math.floor(Math.random() * images.length);
  } while (newIndex === lastIndex);

  lastIndex = newIndex;

  const captionIndex = Math.floor(Math.random() * captions.length);

  img.src = images[newIndex];
  img.style.display = "block";

  cap.innerText = captions[captionIndex];
  cap.style.display = "block";
}
</script>

</body>
</html>
