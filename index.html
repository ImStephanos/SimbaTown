<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      transition: background 0.6s ease;
      background: #caffbf;
    }

    /* SIDES */
    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      z-index: 2;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* CENTER */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
    }

    h1 { margin-bottom: 10px; }

    p {
      font-weight: bold;
      color: #111;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
    }

    .moodBox {
      margin-top: 20px;
      background: rgba(255,255,255,0.4);
      padding: 12px;
      border-radius: 15px;
    }

    input[type="range"] {
      width: 220px;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatUp linear infinite;
      z-index: 1;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.8); }
      to { transform: translateY(-10vh) scale(1.4); }
    }

    /* EASTER EGG */
    #zinchenkoEgg {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.3;
      cursor: pointer;
      user-select: none;
    }

    #zinchenkoEgg:hover {
      opacity: 0.7;
      transform: scale(1.1);
      transition: 0.2s;
    }

    #zinchenkoDogs {
      display: none;
      margin-top: 15px;
      gap: 10px;
      justify-content: center;
    }

    #zinchenkoDogs img {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="side" id="leftSide"></div>

<div class="center">

  <h1>🐶 Simba Town</h1>

  <button onclick="toggleMusic()" id="musicBtn">Play Music 🎵</button>
  <button onclick="showDogs()">Click for comfort</button>

  <div class="grid">
    <img id="dog1">
    <img id="dog2">
    <img id="dog3">
  </div>

  <div id="caption"></div>

  <div class="moodBox">
    <p>How much has Simba improved your mood?</p>
    <input type="range" min="0" max="100" value="60" id="moodSlider" oninput="updateMood(this.value)">
    <div id="moodValue">60%</div>
  </div>

  <!-- ⚽ EASTER EGG -->
  <div id="zinchenkoEgg" onclick="showZinchenko()">
    ⚽ Zinchenko
  </div>

  <div id="zinchenkoDogs">
    <img id="z1">
    <img id="z2">
    <img id="z3">
  </div>

</div>

<div class="side" id="rightSide"></div>

<audio id="bgmusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

function showDogs() {
  const ids = ["dog1", "dog2", "dog3"];
  let picks = [];

  while (picks.length < 3) {
    let i = Math.floor(Math.random() * images.length);
    if (!picks.includes(i)) picks.push(i);
  }

  for (let i = 0; i < 3; i++) {
    const img = document.getElementById(ids[i]);
    img.src = images[picks[i]];
    img.style.display = "block";
  }
}

/* 🎵 MUSIC */
function toggleMusic() {
  const music = document.getElementById("bgmusic");
  const btn = document.getElementById("musicBtn");

  if (music.paused) {
    music.volume = 0.5;
    music.play().then(() => {
      btn.innerText = "Pause Music ⏸️";
    });
  } else {
    music.pause();
    btn.innerText = "Play Music 🎵";
  }
}

/* 🌈 MOOD SYSTEM */
function updateMood(val) {
  document.getElementById("moodValue").innerText = val + "%";

  let bg, colors;

  if (val < 20) {
    bg = "#1a1a1a";
    colors = ["#444", "#666"];
  } else if (val < 40) {
    bg = "#4a4e69";
    colors = ["#6c757d", "#adb5bd"];
  } else if (val < 60) {
    bg = "#5f6f94";
    colors = ["#4dabf7", "#74c0fc"];
  } else if (val < 80) {
    bg = "#caffbf";
    colors = ["#8ce99a", "#b2f2bb"];
  } else {
    bg = "#ffb3d9";
    colors = ["#ff4d6d", "#ff85a1", "#ff9ecf"];
  }

  document.body.style.background = bg;
  regenerateParticles(colors);
}

/* ✨ PARTICLES */
function regenerateParticles(colors) {
  document.querySelectorAll(".particle").forEach(p => p.remove());

  for (let i = 0; i < 80; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    const size = 4 + Math.random() * 8;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";

    const c = colors[Math.floor(Math.random() * colors.length)];
    p.style.background = c;
    p.style.boxShadow = `0 0 10px ${c}`;

    document.body.appendChild(p);
  }
}

/* 🐾 SIDES */
function loadSides() {
  const left = document.getElementById("leftSide");
  const right = document.getElementById("rightSide");

  for (let i = 0; i < 6; i++) {
    let imgL = document.createElement("img");
    let imgR = document.createElement("img");

    imgL.src = images[Math.floor(Math.random() * images.length)];
    imgR.src = images[Math.floor(Math.random() * images.length)];

    left.appendChild(imgL);
    right.appendChild(imgR);
  }
}

/* ⚽ ZINCHENKO EASTER EGG */
function showZinchenko() {
  document.getElementById("z1").src = "zin1.jpg";
  document.getElementById("z2").src = "zin2.jpg";
  document.getElementById("z3").src = "zin3.jpg";

  document.getElementById("zinchenkoDogs").style.display = "flex";
}

/* INIT */
loadSides();
updateMood(60);
</script>

</body>
</html>
