<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      background: #caffbf;
    }

    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      z-index: 2;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .grid img {
      width: 150px;
      height: 150px;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
    }

    .moodBox {
      margin-top: 20px;
      background: rgba(255,255,255,0.4);
      padding: 12px;
      border-radius: 15px;
    }

    input[type="range"] {
      width: 220px;
    }

    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }

    #zinchenkoDogs {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 10px;
      z-index: 10;
      transition: opacity 1s ease;
    }

    #zinchenkoDogs img {
      width: 140px;
      height: 140px;
      border-radius: 12px;
    }

    #drawCanvas {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="flash"></div>
<canvas id="drawCanvas"></canvas>

<div class="side" id="leftSide"></div>

<div class="center">

  <button onclick="toggleMusic()">Music 🎵</button>
  <button onclick="showDogs()">Comfort</button>
  <button onclick="triggerLightning()">⚡ Storm</button>

  <div class="grid">
    <img id="dog1"><img id="dog2"><img id="dog3">
  </div>

  <div id="caption"></div>

  <div class="moodBox">
    <input type="range" min="0" max="100" value="60" id="moodSlider" oninput="updateMood(this.value)">
    <div id="moodValue">60%</div>
  </div>

  <div onclick="showZinchenko()" style="opacity:0.3;cursor:pointer;margin-top:10px;">
    ⚽ Zinchenko
  </div>

</div>

<div class="side" id="rightSide"></div>

<div id="zinchenkoDogs">
  <img src="zin1.png">
  <img src="zin2.png">
  <img src="zin3.png">
</div>

<audio id="bgmusic" loop>
  <source src="music.mp3">
</audio>

<script>

/* 🐶 YOUR FULL CAPTION LIST RESTORED */
const captions = [
  "Simba Says: Smile!",
  "Simba Says: Lock In!",
  "Simba Says: He Loves you!",
  "He Might not be The Lion King but he is Simba",
  "Mackenzie, You are Enough!",
  "A Photo of Simba a day keeps the Stress away",
  "Welcome to The Simba Safehouse",
  "Simba Nation RISE UP!",
  "PAUSE, Go and Cuddle Simba IMMEDIATELY!!!.",
  "Did you know today is National Hug Simba Day",
  "Simbaaaaa",
  "A sad Mackenzie equals a sad Simba so lock tf in",
  "You are Loved",
  "If you’re reading this you need to Hug Simba!",
  "Fun Fact! Did you know hugging Simba for 7 minutes a day can reduce hair loss by 72%",
  "Simba… Simba… Simbaa…"
];

function showDogs(){
  const ids=["dog1","dog2","dog3"];

  for(let i=0;i<3;i++){
    const el=document.getElementById(ids[i]);
    el.src=`dog${Math.floor(Math.random()*30)+1}.jpg`;
    el.style.display="block";
  }

  document.getElementById("caption").innerText =
    captions[Math.floor(Math.random()*captions.length)];
}

/* 🎵 MUSIC */
function toggleMusic(){
  const m=document.getElementById("bgmusic");
  m.paused ? m.play() : m.pause();
}

/* ⚡ LIGHTNING */
function triggerLightning(){
  const f=document.getElementById("flash");
  f.style.opacity=1;
  setTimeout(()=>f.style.opacity=0,150);
}

/* ⚽ ZINCHENKO */
function showZinchenko(){
  const box=document.getElementById("zinchenkoDogs");
  box.style.display="flex";

  setTimeout(()=>{
    box.style.opacity="0";
    setTimeout(()=>{
      box.style.display="none";
      box.style.opacity="1";
    },1000);
  },6000);
}

</script>

</body>
</html>
