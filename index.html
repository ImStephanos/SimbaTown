<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      transition: background 0.6s ease;
      background: #caffbf;
    }

    /* SIDES */
    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      z-index: 2;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* CENTER */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
      position: relative;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .grid img {
      width: 150px;
      height: 150px;
      border-radius: 15px;
      display: none;
    }

    /* MOOD */
    .moodBox {
      margin-top: 20px;
      background: rgba(255,255,255,0.4);
      padding: 12px;
      border-radius: 15px;
    }

    input[type="range"] {
      width: 220px;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.8;
      animation: floatUp linear infinite;
      z-index: 1;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.8); }
      to { transform: translateY(-10vh) scale(1.4); }
    }

    /* ⚡ LIGHTNING FLASH */
    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ✍️ DRAW LAYER */
    #drawCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    /* ⚽ ZINCHENKO */
    #zinchenkoDogs {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 10px;
      z-index: 10;
    }

    #zinchenkoDogs img {
      width: 140px;
      height: 140px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div id="flash"></div>
<canvas id="drawCanvas"></canvas>

<div class="side" id="leftSide"></div>

<div class="center">

  <button onclick="toggleMusic()">Music 🎵</button>
  <button onclick="showDogs()">Comfort</button>
  <button onclick="triggerLightning()">⚡ Storm</button>

  <div class="grid">
    <img id="dog1"><img id="dog2"><img id="dog3">
  </div>

  <div class="moodBox">
    <input type="range" min="0" max="100" value="60" oninput="updateMood(this.value)">
    <div id="moodValue">60%</div>
  </div>

  <div onclick="showZinchenko()" style="opacity:0.3;cursor:pointer;">⚽ Zinchenko</div>

</div>

<div class="side" id="rightSide"></div>

<div id="zinchenkoDogs">
  <img src="zin1.png">
  <img src="zin2.png">
  <img src="zin3.png">
</div>

<audio id="bgmusic" loop>
  <source src="music.mp3">
</audio>

<script>
const images = Array.from({length:30}, (_,i)=>`dog${i+1}.jpg`);

let isDrawing = false;
let ctx;

window.onload = () => {
  const canvas = document.getElementById("drawCanvas");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx = canvas.getContext("2d");

  canvas.addEventListener("mousemove", draw);
  canvas.addEventListener("mousedown", ()=>isDrawing=true);
  canvas.addEventListener("mouseup", ()=>isDrawing=false);

  loadSides();
  updateMood(60);
  spawnParticles();
  lightningLoop();
};

/* ✍️ NEON DRAWING */
function draw(e){
  if(!isDrawing) return;

  const mood = document.getElementById("moodSlider")?.value || 60;

  const colors = mood > 80 ? ["#ff4d6d","#ff85a1"] :
                 mood > 40 ? ["#4dabf7","#74c0fc"] :
                 ["#adb5bd","#666"];

  const color = colors[Math.floor(Math.random()*colors.length)];

  ctx.strokeStyle = color;
  ctx.shadowBlur = 15;
  ctx.shadowColor = color;
  ctx.lineWidth = 4;

  ctx.lineTo(e.clientX, e.clientY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.clientX, e.clientY);

  setTimeout(()=>fadeCanvas(), 2000);
}

/* fade drawing */
function fadeCanvas(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
}

/* ⚽ ZINCHENKO FADE */
function showZinchenko(){
  const box = document.getElementById("zinchenkoDogs");
  box.style.display = "flex";

  setTimeout(()=>{
    box.style.opacity = "0";
    setTimeout(()=>{
      box.style.display="none";
      box.style.opacity="1";
    },1000);
  },6000);
}

/* ⚡ LIGHTNING */
function triggerLightning(){
  const flash = document.getElementById("flash");

  flash.style.opacity = 1;

  setTimeout(()=>flash.style.opacity = 0, 150);
}

function lightningLoop(){
  setInterval(()=>{
    if(Math.random() > 0.85){
      triggerLightning();
    }
  }, 2000);
}

/* PARTICLES (kept simple) */
function spawnParticles(){
  for(let i=0;i<80;i++){
    const p = document.createElement("div");
    p.className="particle";
    p.style.width = p.style.height = (3+Math.random()*6)+"px";
    p.style.left = Math.random()*window.innerWidth+"px";
    p.style.animationDuration = (3+Math.random()*5)+"s";
    p.style.background = "#fff";
    document.body.appendChild(p);
  }
}

/* MUSIC */
function toggleMusic(){
  const m = document.getElementById("bgmusic");
  m.paused ? m.play() : m.pause();
}

/* DOGS */
function showDogs(){
  const ids=["dog1","dog2","dog3"];
  for(let i=0;i<3;i++){
    const el=document.getElementById(ids[i]);
    el.src=`dog${Math.floor(Math.random()*30)+1}.jpg`;
    el.style.display="block";
  }
}
</script>

</body>
</html>
