<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      background: linear-gradient(-45deg, #ffb3c6, #ffd6a5, #caffbf, #a0c4ff);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      z-index: 2;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
      position: relative;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .grid img {
      width: 150px;
      height: 150px;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: floatUp linear infinite;
      z-index: 1;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.8); }
      to { transform: translateY(-10vh) scale(1.4); }
    }

    /* DRAWING CANVAS */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    /* ZINCHENKO */
    #zinchenkoDogs {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 10px;
      z-index: 10;
      transition: opacity 1s ease;
    }

    #zinchenkoDogs img {
      width: 140px;
      height: 140px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<canvas id="draw"></canvas>

<div class="side" id="leftSide"></div>

<div class="center">

  <button onclick="toggleMusic()">Music 🎵</button>
  <button onclick="showDogs()">Comfort</button>

  <div class="grid">
    <img id="dog1"><img id="dog2"><img id="dog3">
  </div>

  <div id="caption"></div>

  <div onclick="showZinchenko()" style="opacity:0.3;cursor:pointer;margin-top:10px;">
    ⚽ Zinchenko
  </div>

</div>

<div class="side" id="rightSide"></div>

<div id="zinchenkoDogs">
  <img src="zin1.png">
  <img src="zin2.png">
  <img src="zin3.png">
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<script>

/* CAPTIONS (YOUR ORIGINAL SET RESTORED) */
const captions = [
  "Simba Says: Smile!",
  "Simba Says: Lock In!",
  "Simba Says: He Loves you!",
  "He Might not be The Lion King but he is Simba",
  "Mackenzie, You are Enough!",
  "A Photo of Simba a day keeps the Stress away",
  "Welcome to The Simba Safehouse",
  "Simba Nation RISE UP!",
  "PAUSE, Go and Cuddle Simba IMMEDIATELY!!!.",
  "Did you know today is National Hug Simba Day",
  "Simbaaaaa",
  "A sad Mackenzie equals a sad Simba so lock tf in",
  "You are Loved",
  "If you’re reading this you need to Hug Simba!",
  "Fun Fact! Did you know hugging Simba for 7 minutes a day can reduce hair loss by 72%",
  "Simba… Simba… Simbaa…"
];

const images = Array.from({length:30}, (_,i)=>`dog${i+1}.jpg`);

/* DOGS + CAPTION */
function showDogs(){
  const ids=["dog1","dog2","dog3"];

  for(let i=0;i<3;i++){
    const el=document.getElementById(ids[i]);
    el.src=images[Math.floor(Math.random()*images.length)];
    el.style.display="block";
  }

  document.getElementById("caption").innerText =
    captions[Math.floor(Math.random()*captions.length)];
}

/* MUSIC */
function toggleMusic(){
  const m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* ZINCHENKO */
function showZinchenko(){
  const box=document.getElementById("zinchenkoDogs");
  box.style.display="flex";
  box.style.opacity="1";

  setTimeout(()=>{
    box.style.opacity="0";
    setTimeout(()=>box.style.display="none",1000);
  },6000);
}

/* SIDES */
function loadSides(){
  const left=document.getElementById("leftSide");
  const right=document.getElementById("rightSide");

  for(let i=0;i<6;i++){
    let l=document.createElement("img");
    let r=document.createElement("img");

    l.src=images[Math.floor(Math.random()*images.length)];
    r.src=images[Math.floor(Math.random()*images.length)];

    left.appendChild(l);
    right.appendChild(r);
  }
}

/* PARTICLES */
function spawnParticles(){
  for(let i=0;i<120;i++){
    const p=document.createElement("div");
    p.className="particle";

    const size=2+Math.random()*6;
    p.style.width=size+"px";
    p.style.height=size+"px";

    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.animationDuration=(4+Math.random()*6)+"s";

    document.body.appendChild(p);
  }
}

/* ✍️ NEON DRAWING */
let ctx, drawing=false;

window.onload=()=>{
  const c=document.getElementById("draw");
  c.width=window.innerWidth;
  c.height=window.innerHeight;
  ctx=c.getContext("2d");

  c.addEventListener("mousedown",()=>drawing=true);
  c.addEventListener("mouseup",()=>drawing=false);
  c.addEventListener("mousemove",draw);

  loadSides();
  spawnParticles();
};

function draw(e){
  if(!drawing) return;

  const color="#ff4d6d";

  ctx.strokeStyle=color;
  ctx.lineWidth=4;
  ctx.shadowBlur=15;
  ctx.shadowColor=color;

  ctx.lineTo(e.clientX,e.clientY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.clientX,e.clientY);

  setTimeout(()=>{
    ctx.fillStyle="rgba(255,255,255,0.03)";
    ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  },1200);
}

</script>

</body>
</html>
