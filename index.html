<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;

      background: linear-gradient(-45deg,
        #ffb3c6, #ffd6a5, #fdffb6,
        #caffbf, #9bf6ff, #a0c4ff,
        #bdb2ff, #ffc6ff
      );

      background-size: 500% 500%;
      animation: gradientMove 6s ease infinite;

      display: flex;
      height: 100vh;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* SIDES */
    .side {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    .side img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      transition: 0.3s;
    }

    .side img:hover {
      transform: scale(1.05);
    }

    /* CENTER */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 { margin-bottom: 10px; }
    p {
      font-weight: bold;
      color: #111;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      margin: 5px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff2e63;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
    }

    .grid img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    #caption {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      max-width: 420px;
    }

    /* MOOD BAR */
    .moodBox {
      margin-top: 20px;
      background: rgba(255,255,255,0.4);
      padding: 12px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }

    input[type="range"] {
      width: 200px;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="side" id="leftSide"></div>

<!-- CENTER -->
<div class="center">

  <h1>🐶 Simba Town</h1>
  <p>Feeling down… welcome to Simba Town.</p>

  <button onclick="toggleMusic()" id="musicBtn">Play Music 🎵</button>
  <button onclick="showDogs()">Click for comfort</button>

  <div class="grid">
    <img id="dog1">
    <img id="dog2">
    <img id="dog3">
  </div>

  <div id="caption"></div>

  <!-- MOOD BAR -->
  <div class="moodBox">
    <p>How much has Simba improved your mood?</p>
    <input type="range" min="0" max="100" value="50" id="moodSlider" oninput="updateMood(this.value)">
    <div id="moodValue">50%</div>
  </div>

</div>

<!-- RIGHT SIDE -->
<div class="side" id="rightSide"></div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Simba says: Smile!",
  "Simba says: Lock in!",
  "Simba says: He loves you!",
  "Mackenzie, you are enough!",
  "You are loved.",
  "Emergency comfort activated.",
  "Take a breath. You’re safe here.",
  "Simba is proud of you.",
  "Comfort mode engaged."
];

let lastIndex = -1;

function showDogs() {
  const caption = document.getElementById("caption");

  let picks = [];
  while (picks.length < 3) {
    let i = Math.floor(Math.random() * images.length);
    if (!picks.includes(i)) picks.push(i);
  }

  const ids = ["dog1", "dog2", "dog3"];

  for (let i = 0; i < 3; i++) {
    const img = document.getElementById(ids[i]);
    img.src = images[picks[i]];
    img.style.display = "block";
  }

  caption.innerText = captions[Math.floor(Math.random() * captions.length)];
}

/* MUSIC */
function toggleMusic() {
  const music = document.getElementById("bgmusic");
  const btn = document.getElementById("musicBtn");

  if (music.paused) {
    music.play();
    btn.innerText = "Pause Music ⏸️";
  } else {
    music.pause();
    btn.innerText = "Play Music 🎵";
  }
}

/* MOOD BAR */
function updateMood(val) {
  document.getElementById("moodValue").innerText = val + "%";
}

/* SIDE IMAGE FILLERS */
function loadSides() {
  const left = document.getElementById("leftSide");
  const right = document.getElementById("rightSide");

  for (let i = 0; i < 5; i++) {
    let imgL = document.createElement("img");
    let imgR = document.createElement("img");

    imgL.src = images[Math.floor(Math.random() * images.length)];
    imgR.src = images[Math.floor(Math.random() * images.length)];

    left.appendChild(imgL);
    right.appendChild(imgR);
  }
}

/* PARTICLES */
function createParticles() {
  for (let i = 0; i < 25; i++) {
    let p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (5 + Math.random() * 5) + "s";
    p.style.opacity = Math.random();

    document.body.appendChild(p);
  }
}

loadSides();
createParticles();
</script>

</body>
</html>
