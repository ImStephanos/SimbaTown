<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;

      /* nicer background */
      background: linear-gradient(135deg, #fff7f0, #ffe4ec);

      /* center everything */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      color: #444;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #ff7b7b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff5f5f;
    }

    img {
      margin-top: 25px;
      max-width: 320px;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
      display: none;
      max-width: 420px;
    }
  </style>
</head>

<body>

<h1>🐶 Simba Town</h1>

<p>Feeling down… welcome to Simba Town.</p>

<button onclick="showDog()">Click for comfort</button>

<img id="dog" src="">
<div id="caption"></div>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Feeling down… welcome to Simba Town 🐶",
  "Simba has detected low mood levels.",
  "You are safe here.",
  "Simba is watching over you.",
  "Take a breath. You’re okay.",
  "Dog comfort protocol activated.",
  "Simba approves of your existence.",
  "You are not alone right now.",
  "This is your soft reset moment.",
  "Welcome to a safer place."
];

function showDog() {
  const imgIndex = Math.floor(Math.random() * images.length);
  const capIndex = Math.floor(Math.random() * captions.length);

  const img = document.getElementById("dog");
  const cap = document.getElementById("caption");

  img.src = images[imgIndex];
  img.style.display = "block";

  cap.innerText = captions[capIndex];
  cap.style.display = "block";
}
</script>

</body>
</html>
