<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;

      /* ✨ animated background */
      background: linear-gradient(-45deg, #fff7f0, #ffe4ec, #e0f7ff, #fff0f6);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      color: #444;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #ff7b7b;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #ff5f5f;
      transform: scale(1.05);
    }

    img {
      margin-top: 25px;
      max-width: 320px;
      border-radius: 15px;
      display: none;
    }

    #caption {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
      display: none;
      max-width: 420px;
    }
  </style>
</head>

<body>

<h1>🐶 Simba Town</h1>

<p>Feeling down… welcome to Simba Town.</p>

<button onclick="showDog()">Click for comfort</button>

<img id="dog" src="">
<div id="caption"></div>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Simba Town is open 🐶",
  "Simba has entered the chat.",
  "You are safe here.",
  "This is your soft reset moment.",
  "Dog support protocol activated.",
  "Simba approves of your existence.",
  "You are not alone.",
  "Take a breath. You’re okay.",
  "Welcome to comfort mode.",
  "Simba is watching over you.",
  "Everything is okay right now.",
  "You’ve been selected for dog support.",
  "This is your reminder to rest.",
  "Simba believes in you.",
  "No thoughts. Just dogs.",
  "You are doing better than you think.",
  "Emergency happiness delivery 🐶",
  "Simba says: stay a while.",
  "You matter more than you think.",
  "Soft moment detected.",
  "You are under emotional support protection.",
  "Dog energy incoming.",
  "Simba is proud of you.",
  "You’re safe in Simba Town.",
  "Pause. Breathe. Dog time.",
  "Everything will be okay.",
  "Simba is here for you.",
  "Gentle reminder: you’re enough.",
  "Comfort mode engaged.",
  "This dog believes in you.",
  "Welcome home 🐶"
];

let lastIndex = -1;

function showDog() {
  const img = document.getElementById("dog");
  const cap = document.getElementById("caption");

  // prevent same image twice in a row
  let newIndex;
  do {
    newIndex = Math.floor(Math.random() * images.length);
  } while (newIndex === lastIndex);

  lastIndex = newIndex;

  const captionIndex = Math.floor(Math.random() * captions.length);

  img.src = images[newIndex];
  img.style.display = "block";

  cap.innerText = captions[captionIndex];
  cap.style.display = "block";
}
</script>

</body>
</html>
