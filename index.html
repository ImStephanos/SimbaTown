<!DOCTYPE html>
<html>
<head>
  <title>Simba Town</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff7f0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      color: #444;
    }

    button {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #ff7b7b;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #ff5f5f;
      transform: scale(1.05);
    }

    img {
      margin-top: 25px;
      max-width: 320px;
      border-radius: 15px;
      display: none;
      transition: all 0.3s ease;
    }

    #caption {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
      display: none;
      max-width: 420px;
    }
  </style>
</head>

<body>

<h1>🐶 Simba Town</h1>

<p>Feeling down… welcome to Simba Town.</p>

<button onclick="showDog()">Click for comfort</button>

<img id="dog" src="">
<div id="caption"></div>

<script>
const images = Array.from({length: 30}, (_, i) => `dog${i + 1}.jpg`);

const captions = [
  "Feeling down… welcome to Simba Town 🐶",
  "Simba has detected low mood levels. LOCK IN MACKENZIE.",
  "Sad Mackenzie means Sad Simba, so lock tf in.",
  "a smile from simba saves the day.",
  "Simba Says: SMILE!!!.",
  "Simba is a way of life.",
  "Simba approves your existence.",
  "He might not be the lion king but he is Simba.",
  "No thoughts. Just Simba.",
  "Welcome to the simba safehouse."
];

function showDog() {
  const i = Math.floor(Math.random() * images.length);
  const c = Math.floor(Math.random() * captions.length);

  const img = document.getElementById("dog");
  const cap = document.getElementById("caption");

  img.src = images[i];
  img.style.display = "block";

  cap.innerText = captions[c];
  cap.style.display = "block";
}
</script>

</body>
</html>
